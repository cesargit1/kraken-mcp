<!-- ══════════════ AGENT TAB ══════════════ -->
<div id="tab-agent" class="tab-panel">

  <!-- Current Runs Summary -->
  <div class="px-4 sm:px-6 lg:px-8 mb-6">
    <h2 class="text-base/7 font-semibold text-white mb-3">⚡ Active Runs</h2>
    <div id="active-runs-body" class="rounded-lg bg-gray-700/10 border border-white/5 p-4">
      <p class="text-sm text-gray-500">No agents running</p>
    </div>
  </div>

  <div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center">
      <div class="sm:flex-auto">
        <h2 class="text-base/7 font-semibold text-white">🗂 Agent Run History</h2>
      </div>
      <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
        <button class="rounded-md bg-white/10 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-white/20" onclick="loadHistory()" id="history-refresh-btn">↻ Refresh</button>
      </div>
    </div>
    <div class="mt-4" id="history-body">
      <div class="py-10 text-center text-gray-500 text-sm">Loading…</div>
    </div>
  </div>
</div>
