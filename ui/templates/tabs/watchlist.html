<!-- ══════════════ WATCHLIST TAB ══════════════ -->
<div id="tab-watchlist" class="tab-panel">

  <!-- Add ticker -->
  <div class="rounded-lg bg-gray-700/10 border border-white/5 p-4 mb-6">
    <h2 class="text-base/7 font-semibold text-white mb-3">➕ Add Ticker</h2>
    <div class="flex flex-col sm:flex-row gap-2 items-start">
      <div class="flex-1 w-full relative">
        <input type="text" id="wl-search" placeholder="Search Kraken pairs (e.g. AAPL, BTC, ETH…)"
               class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
               autocomplete="off" oninput="searchPairsDebounced()" />
        <div id="wl-search-results" class="absolute top-full left-0 right-0 z-50 bg-gray-800 border border-white/10 rounded-b-lg shadow-lg max-h-64 overflow-y-auto hidden"></div>
      </div>
    </div>
    <div id="wl-add-form" class="hidden mt-3 p-3 bg-white/[0.03] border border-white/10 rounded-lg">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 mb-3">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">Ticker (DB key)</label>
          <input type="text" id="wl-ticker" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10" readonly />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">Kraken Pair</label>
          <input type="text" id="wl-pair" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">Source</label>
          <select id="wl-source" class="block w-full rounded-md bg-white/5 py-1.5 pl-3 pr-8 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10 *:bg-gray-800 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500">
            <option value="kraken_crypto">kraken_crypto</option>
            <option value="kraken_xstock">kraken_xstock</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">Asset Class</label>
          <select id="wl-aclass" class="block w-full rounded-md bg-white/5 py-1.5 pl-3 pr-8 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10 *:bg-gray-800 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500">
            <option value="spot">spot</option>
            <option value="tokenized_asset">tokenized_asset</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">Search Name (for X)</label>
          <input type="text" id="wl-sname" placeholder="e.g. Bitcoin BTC" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500" />
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button class="rounded-md bg-indigo-500 px-3 py-1.5 text-sm font-semibold text-white hover:bg-indigo-400" onclick="addWatchlistTicker()">Add to Watchlist</button>
        <button class="rounded-md bg-white/10 px-3 py-1.5 text-sm font-semibold text-white hover:bg-white/20" onclick="cancelAdd()">Cancel</button>
        <span id="wl-add-status" class="text-sm"></span>
      </div>
    </div>
  </div>

  <!-- Current watchlist -->
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center">
      <div class="sm:flex-auto">
        <h2 class="text-base/7 font-semibold text-white">📋 Current Watchlist</h2>
      </div>
      <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
        <button class="rounded-md bg-white/10 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-white/20" onclick="loadWatchlist()">↻ Refresh</button>
      </div>
    </div>
    <div class="mt-4 flow-root">
      <div class="-mx-4 -my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
        <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8" id="watchlist-body">
          <div class="py-10 text-center text-gray-500 text-sm">Loading…</div>
        </div>
      </div>
    </div>
  </div>
</div>
