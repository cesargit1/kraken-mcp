<!-- ══════════════ WATCHLIST TAB ══════════════ -->
<div id="tab-watchlist" class="tab-panel">

  <!-- Add ticker -->
  <div class="rounded-lg bg-gray-700/10 border border-white/5 p-4 mb-6">
    <h2 class="text-base/7 font-semibold text-white mb-3">➕ Add Ticker</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Ticker Symbol</label>
        <input type="text" id="wl-ticker" placeholder="e.g. NVDA, AAPL, BTC-USD"
               class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
               autocomplete="off" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Asset Class</label>
        <select id="wl-aclass" class="block w-full rounded-md bg-white/5 py-1.5 pl-3 pr-8 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10 *:bg-gray-800 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500">
          <option value="stock">stock</option>
          <option value="crypto">crypto</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Search Name (for X)</label>
        <input type="text" id="wl-sname" placeholder="e.g. NVIDIA NVDA" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500" />
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button class="rounded-md bg-indigo-500 px-3 py-1.5 text-sm font-semibold text-white hover:bg-indigo-400" onclick="addWatchlistTicker()">Add to Watchlist</button>
      <span id="wl-add-status" class="text-sm"></span>
    </div>
  </div>

  <!-- Current watchlist -->
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center">
      <div class="sm:flex-auto">
        <h2 class="text-base/7 font-semibold text-white">📋 Current Watchlist</h2>
      </div>
      <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
        <button class="rounded-md bg-white/10 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-white/20" onclick="loadWatchlist()">↻ Refresh</button>
      </div>
    </div>
    <div class="mt-4 flow-root">
      <div class="-mx-4 -my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
        <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8" id="watchlist-body">
          <div class="py-10 text-center text-gray-500 text-sm">Loading…</div>
        </div>
      </div>
    </div>
  </div>
</div>
